name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "scripts/**"
      - "sounds/**"
      - "hooks/**"
      - ".claude-plugin/**"
      - "config.json"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Check if version changed
        id: version-check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @agentmag/sounds version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.changed == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish (version unchanged)
        if: steps.version-check.outputs.changed == 'false'
        run: echo "Version ${{ steps.version-check.outputs.local }} already published. Bump version in package.json to trigger a publish."
